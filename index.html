<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student ERP System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Student ERP </h1>
        
        <div class="form-container">
            <input type="text" id="studentName" placeholder="Enter Student Name">
            <input type="text" id="studentage" placeholder="Enter Student Age">
            <input type="text" id="studentgrade" placeholder="Enter Student Grade">
            <input type="text" id="studentcourse" placeholder="Enter Student Course">
            <button onclick="addOrUpdateStudent()" id="submitBtn">Add Student</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Age</th>
                    <th>Name</th>
                    <th>Grade</th>
                    <th>Course</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="studentTableBody">
                </tbody>
        </table>
    </div>
    <script src="main.js"></script>
</body>
</html>
